<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erro ao Enviar Mensagem</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0f12;
      color: #e8edf5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image: radial-gradient(ellipse 80% 50% at 50% -5%, rgba(239,68,68,0.07), transparent);
    }

    .wrapper { width: 100%; max-width: 480px; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .header-icon {
      width: 42px; height: 42px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.22);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg { width: 20px; height: 20px; fill: #ef4444; }

    .header h1 { font-size: 1.1rem; font-weight: 600; color: #e8edf5; letter-spacing: -0.01em; }
    .header p  { font-size: 0.72rem; color: #4a5568; font-family: "SF Mono","Fira Code",monospace; margin-top: 2px; }

    .card {
      background: #13171e;
      border: 1px solid #1e2430;
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.03) inset;
    }

    .status-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 28px;
      border-bottom: 1px solid #1e2430;
    }

    .error-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }

    .error-ring svg {
      width: 24px; height: 24px;
      stroke: #ef4444; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .status-header h2 {
      font-size: 1.1rem; font-weight: 600;
      color: #e8edf5; letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 0.68rem; font-weight: 500;
      color: #ef4444;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      padding: 3px 9px;
      border-radius: 20px;
      margin-top: 8px;
    }

    .status-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ef4444;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding: 11px 14px;
      background: #1a1f29;
      border: 1px solid #242b38;
      border-radius: 7px;
    }

    .field.message {
      flex-direction: column;
      gap: 8px;
      border-color: rgba(239,68,68,0.2);
      background: rgba(239,68,68,0.04);
    }

    .field-key {
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 0.68rem; font-weight: 500;
      color: #3d4a5e;
      letter-spacing: 0.08em; text-transform: uppercase;
      flex-shrink: 0;
    }

    .field-value {
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 0.78rem;
      color: #c8d4e8;
      text-align: right;
      word-break: break-all;
    }

    .field-value.error-message {
      color: #fca5a5;
      text-align: left;
      line-height: 1.5;
    }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 11px 20px;
      background: #1a1f29;
      border: 1px solid #242b38;
      border-radius: 7px;
      color: #7a8aa0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.825rem; font-weight: 500;
      text-decoration: none;
      transition: border-color 160ms ease, color 160ms ease, background 160ms ease;
    }

    .back-link svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .back-link:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239,68,68,0.04);
    }

    @media (max-width: 480px) {
      .card { padding: 28px 18px; }
      .field { flex-direction: column; gap: 4px; }
      .field-value { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      </div>
      <div>
        <h1>Enviar Mensagem WhatsApp</h1>
        <p>Evolution API · envio direto</p>
      </div>
    </div>

    <div class="card">

      <div class="status-header">
        <div class="error-ring">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <h2>Erro ao Enviar Mensagem</h2>
        <span class="status-badge">{{$json.error.name}}</span>
      </div>

      <div class="fields">
        <div class="field message">
          <span class="field-key">Mensagem</span>
          <span class="field-value error-message">{{$json.error.message}}</span>
        </div>
        <div class="field">
          <span class="field-key">Descrição</span>
          <span class="field-value">{{$json.error.description}}</span>
        </div>
      </div>

      <a href="/webhook/send-whatsapp" class="back-link">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Tentar Novamente
      </a>

    </div>
  </div>
</body>
</html>
